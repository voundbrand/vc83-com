services:
  compliance-engine:
    build: .
    ports:
      - "127.0.0.1:3335:3335"
    volumes:
      - compliance-data:/data/compliance
    environment:
      - COMPLIANCE_ENCRYPTION_KEY=${COMPLIANCE_ENCRYPTION_KEY:-}
      - COMPLIANCE_FRAMEWORKS=${COMPLIANCE_FRAMEWORKS:-gdpr}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    restart: unless-stopped

volumes:
  compliance-data:
