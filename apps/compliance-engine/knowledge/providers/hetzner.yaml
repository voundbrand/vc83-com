    subprocessor_register:
      status: available
      source: https://www.hetzner.com/unternehmen/unterauftragnehmer
      operator_action: Export weekly snapshot for release evidence pack.
    tom_controls:
      status: available
      source: https://www.hetzner.com/AV-Vertrag/TOM.pdf
      operator_action: Attach current TOM PDF version to provider dossier.
    data_residency_controls:
      status: available
      source: https://accounts.hetzner.com/avv
      operator_action: Record selected EU/DC region in deployment evidence.
    transfer_mechanism:
      status: none_required
      source: https://accounts.hetzner.com/avv
      operator_action: Keep transfer mechanism field as `none_required` while EU-only remains true.
    retention_controls:
      status: unknown_blocking
