name: i18n-guard

on:
  pull_request:
    paths:
      - "src/app/builder/**"
      - "src/app/layers/**"
      - "src/components/builder/**"
      - "src/components/layers/**"
      - "src/components/window-content/**"
      - "convex/translations/**"
      - "scripts/i18n/**"
      - "scripts/ci/check-i18n-audit.sh"
      - "scripts/ci/check-i18n-namespace-load-budget.sh"
      - "docs/reference_docs/topic_collections/implementation/i18n-untranslated-coverage/reports/baseline.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/i18n-guard.yml"
  push:
    branches:
      - "main"
    paths:
      - "src/app/builder/**"
      - "src/app/layers/**"
      - "src/components/builder/**"
      - "src/components/layers/**"
      - "src/components/window-content/**"
      - "convex/translations/**"
      - "scripts/i18n/**"
      - "scripts/ci/check-i18n-audit.sh"
      - "scripts/ci/check-i18n-namespace-load-budget.sh"
      - "docs/reference_docs/topic_collections/implementation/i18n-untranslated-coverage/reports/baseline.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/i18n-guard.yml"

jobs:
  i18n-guard:
    runs-on: ubuntu-latest
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run i18n untranslated-string regression audit
        run: npm run i18n:audit

      - name: Run i18n namespace load budget guard
        run: npm run i18n:namespace:budget

      - name: Run i18n namespace and locale completeness check
        run: npx tsx scripts/i18n/check-locale-completeness.ts --locales en,de,pl,es,fr,ja
