name: macos-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v (example: 0.1.0)"
        required: true
        type: string
      release_channel:
        description: "Release channel"
        required: true
        default: stable
        type: choice
        options:
          - internal
          - canary
          - stable
      release_tag:
        description: "Optional explicit tag override; must equal v<version> if provided"
        required: false
        type: string

concurrency:
  group: macos-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  macos-release:
    runs-on: macos-15
    timeout-minutes: 90
    env:
      CI: "true"
      APP_NAME: SevenLayers
      DOWNLOAD_URL_PREFIX: ${{ secrets.DOWNLOAD_URL_PREFIX }}
      RELEASE_NOTES_URL_BASE: ${{ secrets.RELEASE_NOTES_URL_BASE }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      NOTARYTOOL_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
      NOTARYTOOL_ISSUER: ${{ secrets.NOTARY_ISSUER_ID }}
      SPARKLE_PRIVATE_KEY_BASE64: ${{ secrets.SPARKLE_PRIVATE_KEY_BASE64 }}
      SPARKLE_PUBLIC_KEY: ${{ secrets.SPARKLE_PUBLIC_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release inputs
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "push" ]]; then
            release_tag="${GITHUB_REF_NAME}"
            version="${release_tag#v}"
            release_channel="stable"
          else
            version="${{ github.event.inputs.version }}"
            release_channel="${{ github.event.inputs.release_channel }}"
            release_tag_input="${{ github.event.inputs.release_tag }}"
            expected_release_tag="v${version}"
            if [[ -n "${release_tag_input}" && "${release_tag_input}" != "${expected_release_tag}" ]]; then
              echo "release_tag must equal ${expected_release_tag} when provided (received: ${release_tag_input})." >&2
              exit 1
            fi
            release_tag="${expected_release_tag}"
          fi

          if [[ -z "${version}" ]]; then
            echo "Unable to resolve release version." >&2
            exit 1
          fi
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must match semantic-release style format (received: ${version})." >&2
            exit 1
          fi
          if [[ "${release_channel}" != "internal" && "${release_channel}" != "canary" && "${release_channel}" != "stable" ]]; then
            echo "release_channel must be internal|canary|stable (received: ${release_channel})." >&2
            exit 1
          fi
          if [[ ! "${release_tag}" =~ ^v ]]; then
            echo "Release tag must begin with v (received: ${release_tag})." >&2
            exit 1
          fi

          echo "VERSION=${version}" >> "${GITHUB_ENV}"
          echo "RELEASE_CHANNEL=${release_channel}" >> "${GITHUB_ENV}"
          echo "RELEASE_TAG=${release_tag}" >> "${GITHUB_ENV}"
          echo "RELEASE_NAME=SevenLayers ${version}" >> "${GITHUB_ENV}"
          echo "RELEASE_EVIDENCE_DIR=apps/macos/dist/release" >> "${GITHUB_ENV}"

      - name: Validate release secrets and public URLs
        shell: bash
        env:
          MACOS_DEVELOPER_ID_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_P12_BASE64 }}
          MACOS_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_P12_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
          NOTARY_KEY_P8_BASE64: ${{ secrets.NOTARY_KEY_P8_BASE64 }}
          SPARKLE_PRIVATE_KEY_BASE64: ${{ secrets.SPARKLE_PRIVATE_KEY_BASE64 }}
          SPARKLE_PUBLIC_KEY: ${{ secrets.SPARKLE_PUBLIC_KEY }}
          DOWNLOAD_URL_PREFIX: ${{ secrets.DOWNLOAD_URL_PREFIX }}
          RELEASE_NOTES_URL_BASE: ${{ secrets.RELEASE_NOTES_URL_BASE }}
        run: |
          set -euo pipefail

          required_secret_names=(
            MACOS_DEVELOPER_ID_P12_BASE64
            MACOS_DEVELOPER_ID_P12_PASSWORD
            APPLE_TEAM_ID
            NOTARY_KEY_ID
            NOTARY_ISSUER_ID
            NOTARY_KEY_P8_BASE64
            SPARKLE_PRIVATE_KEY_BASE64
            SPARKLE_PUBLIC_KEY
            DOWNLOAD_URL_PREFIX
            RELEASE_NOTES_URL_BASE
          )
          for secret_name in "${required_secret_names[@]}"; do
            if [[ -z "${!secret_name:-}" ]]; then
              echo "Missing required secret: ${secret_name}" >&2
              exit 1
            fi
          done

          if [[ "${DOWNLOAD_URL_PREFIX}" != https://* || "${DOWNLOAD_URL_PREFIX}" == *"example.invalid"* ]]; then
            echo "DOWNLOAD_URL_PREFIX must be a production https URL." >&2
            exit 1
          fi
          if [[ "${RELEASE_NOTES_URL_BASE}" != https://* || "${RELEASE_NOTES_URL_BASE}" == *"example.invalid"* ]]; then
            echo "RELEASE_NOTES_URL_BASE must be a production https URL." >&2
            exit 1
          fi

      - name: Validate GitHub release permissions
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh auth status >/dev/null
          gh release list --repo "${{ github.repository }}" --limit 1 >/dev/null

      - name: Import Developer ID certificate
        shell: bash
        env:
          MACOS_DEVELOPER_ID_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_P12_BASE64 }}
          MACOS_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_P12_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -z "${MACOS_DEVELOPER_ID_P12_BASE64}" || -z "${MACOS_DEVELOPER_ID_P12_PASSWORD}" ]]; then
            echo "Missing Developer ID certificate secrets." >&2
            exit 1
          fi

          decode_b64() {
            local content="$1"
            local output="$2"
            if printf '%s' "${content}" | base64 --decode > "${output}" 2>/dev/null; then
              return 0
            fi
            if printf '%s' "${content}" | base64 -d > "${output}" 2>/dev/null; then
              return 0
            fi
            printf '%s' "${content}" | base64 -D > "${output}"
          }

          keychain_path="${RUNNER_TEMP}/vc83-macos-release.keychain-db"
          keychain_password="$(uuidgen)"
          cert_path="${RUNNER_TEMP}/developer-id.p12"

          decode_b64 "${MACOS_DEVELOPER_ID_P12_BASE64}" "${cert_path}"

          security create-keychain -p "${keychain_password}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${keychain_password}" "${keychain_path}"
          security list-keychains -d user -s "${keychain_path}"
          security import "${cert_path}" -k "${keychain_path}" -P "${MACOS_DEVELOPER_ID_P12_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcrun
          security set-key-partition-list -S apple-tool:,apple: -s -k "${keychain_password}" "${keychain_path}"

          sign_identity="$(
            security find-identity -v -p codesigning "${keychain_path}" | awk -F'"' '/Developer ID Application/ {print $2; exit}'
          )"
          if [[ -z "${sign_identity}" ]]; then
            echo "Developer ID Application identity not found after import." >&2
            exit 1
          fi

          echo "MACOS_RELEASE_KEYCHAIN_PATH=${keychain_path}" >> "${GITHUB_ENV}"
          echo "MACOS_RELEASE_KEYCHAIN_PASSWORD=${keychain_password}" >> "${GITHUB_ENV}"
          echo "SIGN_IDENTITY=${sign_identity}" >> "${GITHUB_ENV}"

      - name: Decode notary API key
        shell: bash
        env:
          NOTARY_KEY_P8_BASE64: ${{ secrets.NOTARY_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail

          if [[ -z "${NOTARY_KEY_P8_BASE64}" || -z "${NOTARYTOOL_KEY_ID}" || -z "${NOTARYTOOL_ISSUER}" || -z "${APPLE_TEAM_ID}" ]]; then
            echo "Missing notarization secrets." >&2
            exit 1
          fi

          decode_b64() {
            local content="$1"
            local output="$2"
            if printf '%s' "${content}" | base64 --decode > "${output}" 2>/dev/null; then
              return 0
            fi
            if printf '%s' "${content}" | base64 -d > "${output}" 2>/dev/null; then
              return 0
            fi
            printf '%s' "${content}" | base64 -D > "${output}"
          }

          notary_key_path="${RUNNER_TEMP}/AuthKey_${NOTARYTOOL_KEY_ID}.p8"
          decode_b64 "${NOTARY_KEY_P8_BASE64}" "${notary_key_path}"
          chmod 600 "${notary_key_path}"
          echo "NOTARYTOOL_KEY=${notary_key_path}" >> "${GITHUB_ENV}"

      - name: Build and package signed artifacts
        shell: bash
        run: |
          set -euo pipefail
          cd apps/macos
          MODE=strict \
          APP_NAME="${APP_NAME}" \
          VERSION="${VERSION}" \
          RELEASE_CHANNEL="${RELEASE_CHANNEL}" \
          OUT_DIR="dist/release" \
          SIGN_IDENTITY="${SIGN_IDENTITY}" \
          NOTARYTOOL_KEY="${NOTARYTOOL_KEY}" \
          NOTARYTOOL_KEY_ID="${NOTARYTOOL_KEY_ID}" \
          NOTARYTOOL_ISSUER="${NOTARYTOOL_ISSUER}" \
          APPLE_TEAM_ID="${APPLE_TEAM_ID}" \
          DOWNLOAD_URL_PREFIX="${DOWNLOAD_URL_PREFIX}" \
          RELEASE_NOTES_URL_BASE="${RELEASE_NOTES_URL_BASE}" \
          RUN_NOTARIZATION=0 \
          RUN_APPCAST_SIGN=0 \
          PUBLISH_GITHUB_RELEASE=0 \
          scripts/release-pipeline.sh

      - name: Notarize and staple release artifacts
        shell: bash
        run: |
          set -euo pipefail
          cd apps/macos
          MODE=strict \
          APP_NAME="${APP_NAME}" \
          VERSION="${VERSION}" \
          OUT_DIR="dist/release" \
          NOTARYTOOL_KEY="${NOTARYTOOL_KEY}" \
          NOTARYTOOL_KEY_ID="${NOTARYTOOL_KEY_ID}" \
          NOTARYTOOL_ISSUER="${NOTARYTOOL_ISSUER}" \
          APPLE_TEAM_ID="${APPLE_TEAM_ID}" \
          scripts/release-notarize.sh

      - name: Sign appcast
        shell: bash
        run: |
          set -euo pipefail
          cd apps/macos
          MODE=strict \
          APP_NAME="${APP_NAME}" \
          VERSION="${VERSION}" \
          RELEASE_CHANNEL="${RELEASE_CHANNEL}" \
          OUT_DIR="dist/release" \
          SPARKLE_PRIVATE_KEY_BASE64="${SPARKLE_PRIVATE_KEY_BASE64}" \
          SPARKLE_PUBLIC_KEY="${SPARKLE_PUBLIC_KEY}" \
          scripts/release-sign-appcast.sh

      - name: Publish GitHub release
        shell: bash
        run: |
          set -euo pipefail
          cd apps/macos
          MODE=strict \
          APP_NAME="${APP_NAME}" \
          VERSION="${VERSION}" \
          RELEASE_CHANNEL="${RELEASE_CHANNEL}" \
          OUT_DIR="dist/release" \
          RELEASE_TAG="${RELEASE_TAG}" \
          RELEASE_NAME="${RELEASE_NAME}" \
          GH_REPO="${GH_REPO}" \
          GITHUB_TOKEN="${GITHUB_TOKEN}" \
          GH_TOKEN="${GH_TOKEN}" \
          scripts/release-github.sh

      - name: Upload release pipeline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-${{ env.RELEASE_TAG }}
          path: |
            apps/macos/dist/release
            apps/macos/dist/SevenLayers.app
          if-no-files-found: error

      - name: Publish release summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          evidence_dir="${RELEASE_EVIDENCE_DIR:-apps/macos/dist/release}"
          pipeline_evidence="${evidence_dir}/release-pipeline-evidence.json"
          notarization_report="${evidence_dir}/notarization-report.json"
          appcast_report="${evidence_dir}/appcast-signature-evidence.json"
          github_report="${evidence_dir}/github-release-report.json"
          update_contract="${evidence_dir}/update-contract.json"

          echo "## SevenLayers macOS release evidence" >> "${GITHUB_STEP_SUMMARY}"
          echo "- App name: \`${APP_NAME}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Version: \`${VERSION}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Channel: \`${RELEASE_CHANNEL}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Tag: \`${RELEASE_TAG}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Evidence root: \`${evidence_dir}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Pipeline evidence: \`${pipeline_evidence}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Notarization report: \`${notarization_report}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Appcast signature report: \`${appcast_report}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "- GitHub release report: \`${github_report}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Update contract: \`${update_contract}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "### Rollback pointers" >> "${GITHUB_STEP_SUMMARY}"
          echo "1. Notarization failure: inspect \`${notarization_report}\` and \`${evidence_dir}/notarytool-submit.json\`." >> "${GITHUB_STEP_SUMMARY}"
          echo "2. Appcast signing failure: inspect \`${appcast_report}\` and \`${evidence_dir}/updates/${RELEASE_CHANNEL}/appcast.xml\`." >> "${GITHUB_STEP_SUMMARY}"
          echo "3. Release publish failure: inspect \`${github_report}\` and rerun with the same \`RELEASE_TAG\` after remediation." >> "${GITHUB_STEP_SUMMARY}"

      - name: Cleanup keychain and notary key
        if: always()
        shell: bash
        run: |
          set +e
          if [[ -n "${MACOS_RELEASE_KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "${MACOS_RELEASE_KEYCHAIN_PATH}" >/dev/null 2>&1 || true
          fi
          if [[ -n "${NOTARYTOOL_KEY:-}" ]]; then
            rm -f "${NOTARYTOOL_KEY}" || true
          fi
