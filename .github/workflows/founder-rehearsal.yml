name: founder-rehearsal

on:
  pull_request:
  push:
    branches:
      - "main"
  workflow_dispatch:

concurrency:
  group: founder-rehearsal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  founder-rehearsal:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_CONVEX_URL: "https://agreeable-lion-828.convex.cloud"
      NEXT_PUBLIC_API_ENDPOINT_URL: "http://127.0.0.1:3000"
      PLAYWRIGHT_BASE_URL: "http://127.0.0.1:3000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run founder rehearsal set
        run: npm run demo:founder

      - name: Validate founder aggregate artifact
        run: |
          node -e '
            const fs = require("fs");
            const required = ["FND-001","FND-002","FND-003","FND-004","FND-005","FND-006","FND-007"];
            const aggregatePath = "tmp/reports/founder-rehearsal/latest.json";
            if (!fs.existsSync(aggregatePath)) {
              console.error(`Missing aggregate artifact: ${aggregatePath}`);
              process.exit(1);
            }
            const aggregate = JSON.parse(fs.readFileSync(aggregatePath, "utf8"));
            if (!Array.isArray(aggregate?.scenarioReports)) {
              console.error("Aggregate artifact is missing scenarioReports.");
              process.exit(1);
            }
            const found = new Set(aggregate.scenarioReports.map((row) => row.scenarioId));
            const missing = required.filter((id) => !found.has(id));
            if (missing.length > 0) {
              console.error(`Aggregate artifact missing scenario rows: ${missing.join(", ")}`);
              process.exit(1);
            }
            if (aggregate.scenarioReports.length !== 7) {
              console.error(`Expected 7 scenario rows, got ${aggregate.scenarioReports.length}.`);
              process.exit(1);
            }
            console.log("Founder aggregate artifact validated.");
          '

      - name: Upload founder rehearsal artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: founder-rehearsal-artifacts
          path: |
            tmp/reports/fnd-001/latest.json
            tmp/reports/fnd-002/latest.json
            tmp/reports/fnd-003/latest.json
            tmp/reports/fnd-004/latest.json
            tmp/reports/fnd-005/latest.json
            tmp/reports/fnd-006/latest.json
            tmp/reports/fnd-007/latest.json
            tmp/reports/founder-rehearsal/latest.json
            tmp/playwright-report/founder
            tmp/test-results/founder
          if-no-files-found: ignore
