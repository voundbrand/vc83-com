name: fnd-007-rehearsal

on:
  pull_request:
  push:
    branches:
      - "main"
  workflow_dispatch:

concurrency:
  group: fnd-007-rehearsal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fnd-007-rehearsal:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_CONVEX_URL: "https://agreeable-lion-828.convex.cloud"
      NEXT_PUBLIC_API_ENDPOINT_URL: "http://127.0.0.1:3000"
      PLAYWRIGHT_BASE_URL: "http://127.0.0.1:3000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run FND-007 rehearsal
        run: npm run test:e2e:fnd-007

      - name: Assert rehearsal report is PASS
        run: |
          node -e '
            const fs = require("fs");
            const path = "tmp/reports/fnd-007/latest.json";
            if (!fs.existsSync(path)) {
              console.error(`Missing report: ${path}`);
              process.exit(1);
            }
            const report = JSON.parse(fs.readFileSync(path, "utf8"));
            if (report.result !== "PASS") {
              console.error("Expected PASS result for available_now rehearsal.");
              console.error(JSON.stringify(report, null, 2));
              process.exit(1);
            }
            if (report.checkpointFailIds !== "none") {
              console.error("Expected checkpointFailIds to be none.");
              console.error(JSON.stringify(report, null, 2));
              process.exit(1);
            }
            console.log("FND-007 available_now rehearsal report validated.");
          '

      - name: Upload FND-007 rehearsal artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fnd-007-rehearsal-artifacts
          path: |
            tmp/reports/fnd-007/latest.json
            tmp/playwright-report/fnd-007
            tmp/test-results/fnd-007
          if-no-files-found: ignore

  fnd-007-blocked-fail-closed:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_CONVEX_URL: "https://agreeable-lion-828.convex.cloud"
      NEXT_PUBLIC_API_ENDPOINT_URL: "http://127.0.0.1:3000"
      PLAYWRIGHT_BASE_URL: "http://127.0.0.1:3000"
      FND_007_REQUIRE_SANDBOX_DRY_RUN_AUTONOMY: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run blocked-path FND-007 rehearsal
        run: npm run test:e2e:fnd-007

      - name: Assert blocked report is fail-closed with unblocking steps
        run: |
          node -e '
            const fs = require("fs");
            const path = "tmp/reports/fnd-007/latest.json";
            if (!fs.existsSync(path)) {
              console.error(`Missing report: ${path}`);
              process.exit(1);
            }
            const report = JSON.parse(fs.readFileSync(path, "utf8"));
            if (report.preflightStatus !== "blocked") {
              console.error("Expected preflightStatus=blocked.");
              console.error(JSON.stringify(report, null, 2));
              process.exit(1);
            }
            if (report.result !== "FAIL") {
              console.error("Expected blocked rehearsal result=FAIL.");
              console.error(JSON.stringify(report, null, 2));
              process.exit(1);
            }
            if (report.blockedUnblockingStepsPresent !== "yes") {
              console.error("Expected blockedUnblockingStepsPresent=yes.");
              console.error(JSON.stringify(report, null, 2));
              process.exit(1);
            }
            const steps = report.preflight_status?.unblockingSteps;
            if (!Array.isArray(steps) || steps.length === 0) {
              console.error("Expected concrete unblocking steps in preflight_status.unblockingSteps.");
              console.error(JSON.stringify(report, null, 2));
              process.exit(1);
            }
            console.log("FND-007 blocked fail-closed report validated.");
          '

      - name: Upload FND-007 blocked artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fnd-007-blocked-artifacts
          path: |
            tmp/reports/fnd-007/latest.json
            tmp/playwright-report/fnd-007
            tmp/test-results/fnd-007
          if-no-files-found: ignore
